services:
  postgres:
    image: postgres:16-alpine
    container_name: storytelly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: storytelly
      POSTGRES_PASSWORD: storytelly
      POSTGRES_DB: storytelly
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storytelly -d storytelly"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: storytelly-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: storytelly
      MINIO_ROOT_PASSWORD: storytelly-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: storytelly-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 storytelly storytelly-secret;
      mc mb --ignore-existing local/storytelly;
      mc anonymous set none local/storytelly;
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
